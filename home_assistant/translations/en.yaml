configuration:
  wyze:
    name: Wyze Account
    description: >-
      Credentials for your Wyze account. API ID / Key come from the
      [Wyze Developer Console](https://developer-api-console.wyze.com/#/apikey/view).
  wyze.email:
    name: Email
    description: Email address for your Wyze account
  wyze.password:
    name: Password
    description: Password for your Wyze account
  wyze.api_id:
    name: API ID
    description: API ID from the Wyze Developer Console
  wyze.api_key:
    name: API Key
    description: API Key from the Wyze Developer Console
  wyze.totp_key:
    name: TOTP Key
    description: TOTP secret for two-factor authentication (optional)

  bridge:
    name: Bridge (WebUI + REST API)
    description: >-
      The bridge's own HTTP server settings. IP is the one most users
      need to set; the rest are advanced auth controls.
  bridge.ip:
    name: Host IP
    description: >-
      Home Assistant host IP address. Required for in-browser WebRTC
      playback to work through ingress.
  bridge.auth:
    name: Enable WebUI Auth
    description: Require HTTP Basic auth for the WebUI and REST API
  bridge.username:
    name: WebUI Username
    description: Username when Enable WebUI Auth is on
  bridge.password:
    name: WebUI Password
    description: Password when Enable WebUI Auth is on
  bridge.api_token:
    name: REST API Token
    description: >-
      Bearer token required on REST API calls. Independent of the
      WebUI auth above.
  bridge.stream_auth:
    name: Stream Auth
    description: "Global RTSP/WebRTC consumer credentials (format: user:pass)"
  bridge.go2rtc_url:
    name: External go2rtc URL
    description: >-
      Use an existing go2rtc instance (e.g. Frigate's) instead of
      spawning our own. Format: http://host:1984. When set, recording
      and STREAM_AUTH are ignored — configure those on the remote
      go2rtc yaml.

  camera:
    name: Camera Defaults
    description: Defaults applied to every camera unless overridden below.
  camera.quality:
    name: Default Quality
    description: hd or sd
  camera.audio:
    name: Enable Audio
    description: Enable audio streaming by default
  camera.options:
    name: Per-Camera Overrides
    description: >-
      Override quality, audio, or record per camera. CAM_NAME matches
      the Wyze-account name normalized (lowercase, spaces → underscores).

  snapshot:
    name: Snapshots
    description: >-
      Periodic JPEG captures. Path and file_name are templates
      accepting {cam_name}, {CAM_NAME}, and strftime tokens
      (%Y %m %d %H %M %S %s).
  snapshot.path:
    name: Directory Template
    description: >-
      Directory for snapshot files. HA default
      `/media/wyze_bridge/snapshots/{cam_name}/%Y/%m/%d`.
  snapshot.file_name:
    name: Filename Template
    description: Filename stem; .jpg auto-appended. Default `%H-%M-%S`.
  snapshot.interval:
    name: Interval (seconds)
    description: 0 disables periodic capture
  snapshot.keep:
    name: Keep Duration
    description: Auto-delete snapshots older than this (e.g. 72h, 7d; 0 = keep forever)
  snapshot.cameras:
    name: Cameras
    description: Camera names to snapshot (one per entry; empty list = all cameras)

  record:
    name: Recording
    description: Continuous on-disk recording via go2rtc.
  record.all:
    name: Record All Cameras
    description: Enable recording for every camera by default
  record.path:
    name: Directory Template
    description: >-
      Recording directory. HA default
      `/media/wyze_bridge/recordings/{cam_name}/%Y/%m/%d`.
  record.file_name:
    name: Filename Template
    description: Filename stem; .mp4 auto-appended. Default `%H-%M-%S`.
  record.length:
    name: Segment Length
    description: Duration per recording segment (e.g. 60s, 5m, 1h)
  record.keep:
    name: Keep Duration
    description: Auto-delete recordings older than this (e.g. 7d; 0 = keep forever)

  mqtt:
    name: MQTT
    description: >-
      MQTT broker settings. If the Mosquitto broker add-on is
      installed, leave these blank — host/username/password are
      auto-discovered.
  mqtt.enabled:
    name: Enable MQTT
    description: Force-enable MQTT publishing
  mqtt.host:
    name: Host
    description: MQTT broker hostname
  mqtt.port:
    name: Port
    description: MQTT broker port
  mqtt.username:
    name: Username
    description: MQTT broker username
  mqtt.password:
    name: Password
    description: MQTT broker password
  mqtt.topic:
    name: Base Topic
    description: MQTT topic prefix for bridge / camera messages
  mqtt.discovery_topic:
    name: Discovery Topic
    description: Home Assistant MQTT discovery prefix

  filter:
    name: Camera Filter
    description: Limit which cameras the bridge exposes.
  filter.names:
    name: Names
    description: Camera names to include (one per entry; click + to add)
  filter.models:
    name: Models
    description: Model codes to include (one per entry)
  filter.macs:
    name: MAC addresses
    description: MAC addresses to include (one per entry)
  filter.blocks:
    name: Block Mode
    description: Invert filter — listed cameras are excluded instead of included

  location:
    name: Location
    description: Geographic coordinates for sunrise/sunset snapshot scheduling.
  location.latitude:
    name: Latitude
    description: Decimal degrees (e.g. 38.627)
  location.longitude:
    name: Longitude
    description: Decimal degrees (e.g. -90.199)

  webhooks:
    name: Webhooks
    description: HTTP notifications on camera state changes.
  webhooks.urls:
    name: URLs
    description: URLs to notify (one per entry; HA validates each as a URL)

  gwell:
    name: Gwell Protocol Cameras
    description: >-
      Support for OG / Doorbell Pro / Doorbell Duo via a sidecar proxy.
      Off by default in 4.0-beta because the proxy binary is not yet
      shipped in the image.
  gwell.enabled:
    name: Enable Gwell Proxy
    description: Toggle Gwell/IoTVideo P2P support for GW_* camera models

  debug:
    name: Debugging
    description: Log verbosity and protocol tracing.
  debug.log_level:
    name: Log Level
    description: trace, debug, info, warn, or error
  debug.force_iotc_detail:
    name: Verbose TUTK Logging
    description: Enable detailed go2rtc TUTK protocol tracing
