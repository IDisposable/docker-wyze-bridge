name: Wyze Bridge (Edge)
description: >-
  WebRTC/RTSP/HLS bridge for Wyze cameras.
  Stream your Wyze cameras locally without cloud dependencies.
  Edge channel — tracks latest development. May be unstable.
slug: wyze_bridge
url: https://github.com/IDisposable/docker-wyze-bridge
version: 4.0.0-beta
stage: experimental
arch:
  - amd64
  - aarch64
startup: application
boot: auto
host_network: true
ingress: true
ingress_port: 5080
panel_icon: mdi:cctv
watchdog: http://[HOST]:[PORT:5080]/api/health
ports:
  5080/tcp: 5080
  1984/tcp: 1984
  8554/tcp: 8554
  8888/tcp: 8888
  8889/tcp: 8889
  8189/udp: 8189
ports_description:
  5080/tcp: Bridge WebUI
  1984/tcp: go2rtc native UI (optional)
  8554/tcp: RTSP
  8888/tcp: HLS
  8889/tcp: WebRTC HTTP
  8189/udp: WebRTC ICE
map:
  - addon_config:rw
  - media:rw
services:
  - mqtt:want
options:
  QUALITY: hd
  AUDIO: true
  CAM_OPTIONS: []
schema:
  WYZE_EMAIL: email?
  WYZE_PASSWORD: password?
  WYZE_API_ID: str?
  WYZE_API_KEY: str?
  TOTP_KEY: str?
  WB_IP: str?
  WB_AUTH: bool?
  WB_USERNAME: str?
  WB_PASSWORD: str?
  STREAM_AUTH: str?
  QUALITY: list(hd|sd)?
  AUDIO: bool?
  MQTT_ENABLED: bool?
  MQTT_HOST: str?
  MQTT_PORT: port?
  MQTT_USERNAME: str?
  MQTT_PASSWORD: password?
  MQTT_TOPIC: str?
  MQTT_DTOPIC: str?
  FILTER_NAMES: str?
  FILTER_MODELS: str?
  FILTER_MACS: str?
  FILTER_BLOCKS: bool?
  RECORD_ALL: bool?
  RECORD_PATH: str?
  RECORD_FILE_NAME: str?
  RECORD_LENGTH: str?
  RECORD_KEEP: str?
  SNAPSHOT_INT: int?
  SNAPSHOT_FORMAT: str?
  SNAPSHOT_CAMERAS: str?
  SNAPSHOT_KEEP: str?
  IMG_DIR: str?
  LATITUDE: float?
  LONGITUDE: float?
  LOG_LEVEL: list(trace|debug|info|warn|error)?
  FORCE_IOTC_DETAIL: bool?
  WEBHOOK_URLS: str?
  WB_API: str?
  GWELL_ENABLED: bool?
  CAM_OPTIONS:
    - CAM_NAME: str?
      QUALITY: str?
      AUDIO: bool?
      RECORD: bool?
