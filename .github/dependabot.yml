version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - go

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci

  # Dockerfile (go2rtc version, base images)
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"
    labels:
      - dependencies
      - docker

  # HA add-on Dockerfile
  - package-ecosystem: docker
    directory: /home_assistant
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"
    labels:
      - dependencies
      - docker

  # Devcontainer Dockerfile
  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: monthly
    commit-message:
      prefix: "dev"
    labels:
      - dependencies
      - dev
