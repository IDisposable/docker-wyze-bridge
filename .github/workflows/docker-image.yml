name: Docker

on:
  push:
    branches: [go-rewrite, main]
    tags: ['v*.*.*']
  pull_request:
    branches: [go-rewrite, main]
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wyze-bridge
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  HA_ADDON_IMAGE: ghcr.io/${{ github.repository }}-homeassistant

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - name: Run tests
        run: go test -v -cover ./...
      - name: Vet
        run: go vet ./...

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=go-rewrite
            type=ref,event=branch,enable=${{ contains(github.ref, 'main') }}
            type=ref,event=pr
            type=sha,format=long

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF##*/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Read Home Assistant add-on version
        id: addon_version
        run: |
          version=$(awk -F': ' '$1=="version"{print $2; exit}' home_assistant/config.yaml)
          if [[ -z "$version" ]]; then
            echo "Unable to read home_assistant/config.yaml version"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            io.hass.name=Wyze Bridge
            io.hass.description=WebRTC/RTSP/HLS bridge for Wyze cameras
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.type=addon
            io.hass.arch=amd64,aarch64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Home Assistant add-on image
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name != 'pull_request' }}
          context: ./home_assistant
          file: ./home_assistant/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            WYZE_BRIDGE_IMAGE=${{ env.GHCR_IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.description=Home Assistant add-on image for Wyze Bridge
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=docker-wyze-bridge-homeassistant
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.addon_version.outputs.version }}
            io.hass.name=Wyze Bridge
            io.hass.description=WebRTC/RTSP/HLS bridge for Wyze cameras
            io.hass.version=${{ steps.addon_version.outputs.version }}
            io.hass.type=addon
            io.hass.arch=amd64,aarch64
          tags: |
            ${{ env.HA_ADDON_IMAGE }}:${{ steps.addon_version.outputs.version }}
            ${{ env.HA_ADDON_IMAGE }}:edge
            ${{ env.HA_ADDON_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=homeassistant
          cache-to: type=gha,mode=max,scope=homeassistant
          provenance: false

  version-bump:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Update version in config files
        id: bump
        run: |
          TAG=${GITHUB_REF##*/v}
          if [[ ! $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $TAG"
            exit 1
          fi
          sed -i "s/^version: .*/version: ${TAG}/" home_assistant/config.yaml
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: go-rewrite
          commit_message: 'v${{ steps.bump.outputs.tag }}'
          file_pattern: home_assistant/config.yaml
